<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="2500" height="1686" viewBox="0 0 2500 1686" role="img" aria-label="ABSORB LINE 圖文選單六格設計稿">
  <defs>
    <style>
      .brand{font:800 72px "Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;fill:#122643;letter-spacing:6px}
      .label{font:800 132px "Noto Sans TC","Microsoft JhengHei",sans-serif;fill:#152033}
      .hint{font:700 48px "Noto Sans TC","Microsoft JhengHei",sans-serif;fill:#586579}
      .code{font:700 68px "Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;fill:#ffffff}
      .tileA{fill:#ffffff;stroke:#d9e0e8;stroke-width:5}
      .tileB{fill:#eaf0f7;stroke:#d9e0e8;stroke-width:5}
      .pillMint,.pillApricot,.pillLavender{fill:#122643}
    </style>
  </defs>
  <rect width="2500" height="1686" fill="#ffffff"/>
  <image x="42" y="12" width="96" height="96" xlink:href="../static/brand/absorb-mark-128.png"/>
  <text class="brand" x="158" y="88">ABSORB</text>
  <g transform="translate(42 132)">
    <rect class="tileA" x="0" y="0" width="790" height="710" rx="46"/>
    <rect class="tileB" x="810" y="0" width="790" height="710" rx="46"/>
    <rect class="tileA" x="1620" y="0" width="790" height="710" rx="46"/>
    <rect class="tileB" x="0" y="752" width="790" height="710" rx="46"/>
    <rect class="tileA" x="810" y="752" width="790" height="710" rx="46"/>
    <rect class="tileB" x="1620" y="752" width="790" height="710" rx="46"/>

    <g transform="translate(84 92)">
      <rect class="pillMint" x="0" y="0" width="154" height="114" rx="36"/>
      <text class="code" x="42" y="76">01</text>
      <text class="label" x="0" y="292">看大盤</text>
      <text class="hint" x="0" y="496">今天盤面偏強還是偏弱</text>
    </g>

    <g transform="translate(894 92)">
      <rect class="pillApricot" x="0" y="0" width="154" height="114" rx="36"/>
      <text class="code" x="38" y="76">02</text>
      <text class="label" x="0" y="292">找機會</text>
      <text class="hint" x="0" y="496">熱門題材與排行</text>
    </g>

    <g transform="translate(1704 92)">
      <rect class="pillLavender" x="0" y="0" width="154" height="114" rx="36"/>
      <text class="code" x="38" y="76">03</text>
      <text class="label" x="0" y="292">查自選</text>
      <text class="hint" x="0" y="496">你的關注清單</text>
    </g>

    <g transform="translate(84 844)">
      <rect class="pillLavender" x="0" y="0" width="154" height="114" rx="36"/>
      <text class="code" x="36" y="76">04</text>
      <text class="label" x="0" y="292">設提醒</text>
      <text class="hint" x="0" y="496">收盤與趨勢通知</text>
    </g>

    <g transform="translate(894 844)">
      <rect class="pillMint" x="0" y="0" width="154" height="114" rx="36"/>
      <text class="code" x="38" y="76">05</text>
      <text class="label" x="0" y="292">算報酬</text>
      <text class="hint" x="0" y="496">投入金額快速試算</text>
    </g>

    <g transform="translate(1704 844)">
      <rect class="pillApricot" x="0" y="0" width="154" height="114" rx="36"/>
      <text class="code" x="38" y="76">06</text>
      <text class="label" x="0" y="292">深度分析</text>
      <text class="hint" x="0" y="496">圖表、回測、新聞</text>
    </g>
  </g>
</svg>
